x-shared-environment: &shared-environment
  TZ: America/New_York

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - 1883:1883
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
    environment:
      <<: *shared-environment

  db-init:
    build: ./services/db-init
    volumes:
      - ./data:/data
    environment:
      <<: *shared-environment

  ingester:
    build: ./services/ingester
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/data
    environment:
      <<: *shared-environment

  # simulator:
  #   build: ./services/simulator
  #   restart: unless-stopped
  #   depends_on:
  #     mosquitto:
  #       condition: service_started
  #     db-init:
  #       condition: service_completed_successfully
  #   volumes:
  #     - ./data:/data
  #   environment:
  #     <<: *shared-environment

  api:
    build: ./services/api
    restart: unless-stopped
    ports:
      - 8000:8000
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/data
    environment:
      <<: *shared-environment

  influxdb:
    image: influxdb:3-core
    restart: unless-stopped
    environment:
      <<: *shared-environment
      INFLUXDB3_NODE_ID: middlines
      INFLUXDB3_AUTH_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb3
    healthcheck:
      test: ["CMD", "influxdb3", "ping", "--host", "http://localhost:8181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      <<: *shared-environment

  nginx-proxy:
    image: nginx:1.29-trixie
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      influxdb:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      <<: *shared-environment

volumes:
  influxdb-data:
