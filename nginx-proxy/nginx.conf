events {
  worker_connections 1024;
}

http {
  # Use Docker's internal DNS resolver so service names resolve at runtime
  resolver 127.0.0.11 valid=10s;

  # Don't leak the nginx version in error responses
  server_tokens off;

  # Shared proxy settings
  proxy_http_version  1.1;
  proxy_set_header    Connection "";
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;
  proxy_read_timeout  60s;
  proxy_connect_timeout 5s;
  proxy_send_timeout  60s;

  # ── data.middlines.com → InfluxDB 3 Core ──────────────────────────────────
  server {
    listen 80;
    server_name data.middlines.com;

    # Line-protocol write batches can be large
    client_max_body_size 50m;

    # Don't buffer responses — InfluxDB query streaming should reach the
    # client immediately
    proxy_buffering off;

    location / {
      proxy_pass http://influxdb:8181;
    }
  }

  # ── Default → main app ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://frontend:80;
    }
  }
}
