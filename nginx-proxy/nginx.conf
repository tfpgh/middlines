events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s;
  server_tokens off;

  proxy_http_version  1.1;
  proxy_set_header    Connection "";
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;
  proxy_read_timeout  60s;
  proxy_connect_timeout 5s;
  proxy_send_timeout  60s;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1h;

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── data.middlines.com ────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name data.middlines.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 50m;

    location /api/v3/ { proxy_buffering off; proxy_pass http://influxdb:8181; }
    location /api/v2/ { proxy_buffering off; proxy_pass http://influxdb:8181; }
    location /write   { proxy_buffering off; proxy_pass http://influxdb:8181; }
    location /query   { proxy_buffering off; proxy_pass http://influxdb:8181; }
    location /ping    { proxy_pass http://influxdb:8181; }
    location /health  { proxy_pass http://influxdb:8181; }

    location / {
      proxy_pass http://influxdb3-ui:80;
    }
  }

  # ── Default → main app ────────────────────────────────────────────────────
  server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    location / {
      proxy_pass http://frontend:80;
    }
  }
}
