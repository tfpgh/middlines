events {
  worker_connections 1024;
}

http {
  # Use Docker's internal DNS resolver so service names resolve at runtime
  resolver 127.0.0.11 valid=10s;

  # Don't leak the nginx version in error responses
  server_tokens off;

  # Shared proxy settings
  proxy_http_version  1.1;
  proxy_set_header    Connection "";
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;
  proxy_read_timeout  60s;
  proxy_connect_timeout 5s;
  proxy_send_timeout  60s;

  # ── data.middlines.com ────────────────────────────────────────────────────
  server {
    listen 80 http2;
    server_name data.middlines.com;

    # Allow large payloads for line protocol writes
    client_max_body_size 50m;

    # InfluxDB 3 API paths — route directly to influxdb, bypassing the UI
    location /api/v3/ {
      proxy_buffering off;
      proxy_pass http://influxdb:8181;
    }
    location /api/v2/ {
      proxy_buffering off;
      proxy_pass http://influxdb:8181;
    }
    location /write {
      proxy_buffering off;
      proxy_pass http://influxdb:8181;
    }
    location /query {
      proxy_buffering off;
      proxy_pass http://influxdb:8181;
    }
    location /ping {
      proxy_pass http://influxdb:8181;
    }
    location /health {
      proxy_pass http://influxdb:8181;
    }

    # Everything else → InfluxDB 3 Explorer UI
    location / {
      proxy_pass http://influxdb3-ui:80;
    }
  }

  # ── Default → main app ────────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    location / {
      proxy_pass http://frontend:80;
    }
  }
}
